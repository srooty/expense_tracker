{% extends "tracker/base.html" %}
{% block title %}Groups{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center">
        <h2 style="color:#3B82F6;">Groups</h2>
        <a href="{% url 'group_create' %}" class="btn btn-primary">Create group</a>
    </div>

    <div class="row mt-4 g-3">
        {% for g in groups %}
            <div class="col-md-6 col-lg-4">
                <div class="card p-3 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1">{{ g.name }}</h5>
                            <div class="text-muted small">{{ g.members.count }} members</div>
                        </div>
                        <a class="btn btn-sm btn-outline-primary" href="{% url 'group_dashboard' g.id %}">Open</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12">
                <div class="card p-4 shadow-sm">
                    <p class="mb-0">You’re not in any groups yet. Create one to start tracking expenses.</p>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
