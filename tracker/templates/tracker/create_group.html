{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Create Group</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#F3F4F6;">

<div class="container mt-5">

    <div class="card p-4 shadow-sm" style="max-width:500px; margin:auto;">
        <h4>Create Group</h4>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mt-3" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" name="name" placeholder="Group Name">

            <label>Select Members:</label>
            {% for user in users %}
                <div>
                    <input type="checkbox" name="members" value="{{ user.id }}">
                    {{ user.username }}
                </div>
            {% endfor %}

            <button class="btn btn-primary w-100 mt-3">Create Group</button>
        </form>

        <a href="{% url 'groups_list' %}" class="btn btn-link mt-2">← Back</a>
    </div>

</div>

</body>
</html>
