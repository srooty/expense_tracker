{% extends "tracker/base.html" %}
{% block title %}Delete Expense · {{ group.name }}{% endblock %}
{% block content %}
    <div class="card p-4 shadow-sm" style="max-width:600px; margin:auto;">
        <h4 class="mb-2">Delete expense?</h4>
        <p class="text-muted mb-4">
            This will remove <span class="fw-semibold">{{ expense.description }}</span> (₹{{ expense.amount }}) and its splits.
        </p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger w-100">Yes, delete</button>
        </form>

        <a href="{% url 'group_dashboard' group.id %}" class="btn btn-link mt-2">Cancel</a>
    </div>
{% endblock %}
