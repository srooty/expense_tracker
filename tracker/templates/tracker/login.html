{% extends "tracker/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh;">
    <div class="card p-4 shadow" style="width:380px; border-radius:15px;">
        <h3 class="text-center mb-3" style="color:#3B82F6;">Login</h3>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" type="text" name="username" placeholder="Username" required>

            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center mb-0">
            New user? <a href="{% url 'signup' %}">Signup</a>
        </p>
    </div>
</div>
{% endblock %}
