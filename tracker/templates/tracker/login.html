{% extends "tracker/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-icon"><i class="fa-solid fa-right-to-bracket"></i></div>
        <h3 class="text-center mb-2">Welcome back</h3>
        <p class="text-center text-muted mb-4">Log in to manage group expenses, balances, and settlements.</p>

        <form method="POST">
            {% csrf_token %}

            <input class="form-control mb-3" type="text" name="username" placeholder="Username" value="{{ entered_username|default:'' }}" required>

            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <p class="mt-3 text-center mb-0">
            New user? <a href="{% url 'signup' %}">Signup</a>
        </p>
    </div>
</div>
{% endblock %}
