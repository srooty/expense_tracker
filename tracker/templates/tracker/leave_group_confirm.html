{% extends "tracker/base.html" %}
{% block title %}Leave Group · {{ group.name }}{% endblock %}
{% block content %}
    <div class="card p-4 shadow-sm" style="max-width:600px; margin:auto;">
        <h4 class="mb-2">Leave {{ group.name }}?</h4>
        <p class="text-muted mb-4">
            You will no longer see this group or its expenses unless you are added again.
        </p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger w-100">Leave group</button>
        </form>

        <a href="{% url 'group_dashboard' group.id %}" class="btn btn-link mt-2">Cancel</a>
    </div>
{% endblock %}
